<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    {% seo %}

    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}{% if site.github.build_revision %}?v={{ site.github.build_revision }}{% endif %}"
    />
    <link
      rel="stylesheet"
      href="{{ '/assets/css/custom.css' | relative_url }}{% if site.github.build_revision %}?v={{ site.github.build_revision }}{% endif %}"
    />
  </head>

  <body>
    {% include nav.html %}

    <main class="page">
      <div class="page__inner">
        {% if page.title and page.show_title != false %}
          <header class="page__header">
            <h1 class="page__title">{{ page.title }}</h1>
          </header>
        {% endif %}

        <div class="page__content">
          {{ content }}
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p><strong>Steven Lawrence</strong> &middot; <a href="mailto:steven.lawrence@nyulangone.org">steven.lawrence@nyulangone.org</a></p>
        <p><a href="https://maps.google.com/?q=180+Madison+Ave,+New+York,+NY+10016">180 Madison Ave, New York, NY 10016</a></p>
      </div>
    </footer>
  </body>
</html>
